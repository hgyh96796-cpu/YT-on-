name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Prepare dist folder
        run: |
          mkdir -p dist
          mkdir -p dist/assets
          cp index.html dist/ || true
          cp style.css dist/ || true
          cp script.js dist/ || true
          cp -r assets/* dist/assets/ || true

      - name: Create Capacitor Config
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.ec.thumbdownloader",
            "appName": "YT Thumbnail",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Add Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Enable Internet Permission
        run: |
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml || true

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YT-Thumbnail-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
